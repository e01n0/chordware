# Render blueprint — deploys CHORDWARE as a zero-build static site.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chordware
    runtime: static
    # not a build — just stamps the commit SHA into the SW cache name and
    # the UI build tag, so every deploy triggers the SW update cycle
    buildCommand: sed -i "s/__BUILD__/$(echo "${RENDER_GIT_COMMIT:-dev}" | cut -c1-7)/g" index.html sw.js
    staticPublishPath: .
    headers:
      # "/" is served via the rewrite but needs its own header rule —
      # a stale CDN copy of the shell would defeat the SW's network-first
      - path: /
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /sw.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

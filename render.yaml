# Render blueprint — deploys CHORDWARE as a zero-build static site.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chordware
    runtime: static
    buildCommand: ""          # no build step — plain static files
    staticPublishPath: .
    headers:
      # "/" is served via the rewrite but needs its own header rule —
      # a stale CDN copy of the shell would defeat the SW's network-first
      - path: /
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /sw.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
